<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumafit Signage Slider</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
  <!-- 선택 화면 -->
  <div id="select-screen">
    <!-- 오른쪽 모서리 5회 클릭으로 설정 패널 열기 -->
    <div id="secret-tap-area"></div>
    <h1>디스플레이 모드 선택</h1>
    <div class="button-group">
      <button id="btn-vertical" onclick="startSlider('vertical')">세로형</button>
      <button id="btn-horizontal" onclick="startSlider('horizontal')">가로형</button>
    </div>
  </div>

  <!-- 이미지 설정 패널 -->
  <div id="settings-panel" class="hidden">
    <div id="settings-content">
      <h2>이미지 설정</h2>
      <div class="settings-section">
        <h3>세로형</h3>
        <div id="toggle-list-vertical"></div>
      </div>
      <div class="settings-section">
        <h3>가로형</h3>
        <div id="toggle-list-horizontal"></div>
      </div>
      <button id="settings-close" onclick="closeSettings()">닫기</button>
    </div>
  </div>

  <!-- 슬라이더 화면 -->
  <div id="slider-screen" class="hidden">
    <div id="slider-container">
      <div id="slider-track"></div>
    </div>
  </div>

  <script src="script.js?v=3"></script>
</body>
</html>
